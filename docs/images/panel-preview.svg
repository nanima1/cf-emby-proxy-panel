<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">CF Emby Proxy Panel 面板预览</title>
  <desc id="desc">玻璃风格 Emby 反代面板，展示小白生成器、路由卡片拖动排序、部署自检和播放统计。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#edf4f8"/>
      <stop offset="0.48" stop-color="#f6f1e6"/>
      <stop offset="1" stop-color="#e8f3ed"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.48"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#1f2d3d" flood-opacity="0.14"/>
    </filter>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M 56 0 L 0 0 0 56" fill="none" stroke="#ffffff" stroke-opacity="0.32" stroke-width="1"/>
    </pattern>
    <style>
      .card{fill:url(#glass);stroke:#fff;stroke-opacity:.72;filter:url(#shadow)}
      .sub{fill:rgba(255,255,255,.62);stroke:#fff;stroke-opacity:.72}
      .ink{fill:#1d2430;font-family:'Segoe UI','Microsoft YaHei',sans-serif}
      .muted{fill:#657284;font-family:'Segoe UI','Microsoft YaHei',sans-serif}
      .mono{fill:#1d4ed8;font-family:Consolas,monospace}
      .badge{fill:#fff;fill-opacity:.68;stroke:#8ca0b8;stroke-opacity:.3}
      .blue{fill:#2563eb}.green{fill:#14804a}.orange{fill:#c26a16}.red{fill:#d12b2b}
    </style>
  </defs>
  <rect width="1440" height="900" fill="url(#bg)"/>
  <rect width="1440" height="900" fill="url(#grid)" opacity="0.45"/>

  <rect class="card" x="70" y="48" width="1300" height="112" rx="8"/>
  <text class="ink" x="104" y="98" font-size="34" font-weight="800">Emby 反代面板</text>
  <text class="muted" x="104" y="130" font-size="18">路径分流、优选 IP、DNS 自动写入、玻璃面板和拖动排序。</text>
  <rect class="badge" x="104" y="138" width="92" height="28" rx="14"/><text class="muted" x="124" y="158" font-size="13">v3.0.0</text>
  <rect class="badge" x="208" y="138" width="108" height="28" rx="14"/><text class="muted" x="229" y="158" font-size="13">D1 已绑定</text>
  <rect class="badge" x="328" y="138" width="172" height="28" rx="14"/><text class="muted" x="349" y="158" font-size="13">DNS 已配置</text>
  <rect x="1248" y="84" width="82" height="38" rx="7" fill="#fff" fill-opacity=".76" stroke="#8ca0b8" stroke-opacity=".3"/>
  <text class="ink" x="1274" y="109" font-size="15" font-weight="700">退出</text>

  <rect class="card" x="70" y="188" width="820" height="144" rx="8"/>
  <text class="ink" x="102" y="226" font-size="22" font-weight="800">部署自检</text>
  <text class="muted" x="102" y="254" font-size="15">核心配置看起来正常。</text>
  <g transform="translate(102 278)">
    <rect class="sub" width="162" height="42" rx="8"/><text class="green" x="16" y="27" font-size="15" font-weight="800">PASS</text><text class="ink" x="72" y="27" font-size="15">D1 binding</text>
    <rect class="sub" x="178" width="162" height="42" rx="8"/><text class="green" x="194" y="27" font-size="15" font-weight="800">PASS</text><text class="ink" x="250" y="27" font-size="15">D1 tables</text>
    <rect class="sub" x="356" width="182" height="42" rx="8"/><text class="orange" x="372" y="27" font-size="15" font-weight="800">WARN</text><text class="ink" x="434" y="27" font-size="15">DNS variables</text>
  </g>

  <rect class="card" x="70" y="358" width="820" height="424" rx="8"/>
  <text class="ink" x="102" y="398" font-size="22" font-weight="800">路径列表</text>
  <rect x="230" y="374" width="92" height="38" rx="7" fill="#2563eb"/><text fill="#fff" x="248" y="398" font-size="15" font-weight="700">新增路径</text>
  <rect x="334" y="374" width="92" height="38" rx="7" fill="#fff" fill-opacity=".76" stroke="#8ca0b8" stroke-opacity=".3"/><text class="ink" x="365" y="398" font-size="15" font-weight="700">刷新</text>
  <rect x="438" y="374" width="106" height="38" rx="7" fill="#fff" fill-opacity=".76" stroke="#8ca0b8" stroke-opacity=".3"/><text class="ink" x="467" y="398" font-size="15" font-weight="700">测试全部</text>

  <g transform="translate(102 438)">
    <rect class="sub" width="354" height="134" rx="8"/>
    <rect x="18" y="18" width="28" height="28" rx="7" fill="#fff" fill-opacity=".68" stroke="#8ca0b8" stroke-opacity=".3"/>
    <text class="muted" x="27" y="38" font-size="16" font-weight="800">↕</text>
    <text class="ink" x="58" y="39" font-size="24" font-weight="800">/hk</text>
    <rect class="badge" x="282" y="18" width="54" height="26" rx="13"/><text class="muted" x="295" y="36" font-size="12">origin</text>
    <text class="muted" x="18" y="68" font-size="14">香港主线 / 前后端分离</text>
    <text class="muted" x="18" y="96" font-size="13">2 个上游 · 今日播放 28 · 缓存开</text>
    <rect x="18" y="106" width="86" height="28" rx="7" fill="#fff" fill-opacity=".76" stroke="#8ca0b8" stroke-opacity=".3"/><text class="ink" x="34" y="125" font-size="13" font-weight="700">复制入口</text>
  </g>
  <g transform="translate(478 438)">
    <rect class="sub" width="354" height="134" rx="8"/>
    <rect x="18" y="18" width="28" height="28" rx="7" fill="#fff" fill-opacity=".68" stroke="#8ca0b8" stroke-opacity=".3"/>
    <text class="muted" x="27" y="38" font-size="16" font-weight="800">↕</text>
    <text class="ink" x="58" y="39" font-size="24" font-weight="800">/home</text>
    <rect class="badge" x="282" y="18" width="54" height="26" rx="13"/><text class="muted" x="295" y="36" font-size="12">clean</text>
    <text class="muted" x="18" y="68" font-size="14">家庭备用节点</text>
    <text class="muted" x="18" y="96" font-size="13">1 个上游 · 今日播放 9 · 缓存开</text>
    <rect x="18" y="106" width="86" height="28" rx="7" fill="#fff" fill-opacity=".76" stroke="#8ca0b8" stroke-opacity=".3"/><text class="ink" x="34" y="125" font-size="13" font-weight="700">复制入口</text>
  </g>
  <line x1="102" y1="602" x2="832" y2="602" stroke="#2563eb" stroke-width="4" stroke-linecap="round"/>
  <text class="muted" x="102" y="636" font-size="15">拖动卡片左侧 ↕ 手柄即可调整路径顺序，松手后自动保存。</text>

  <rect class="card" x="930" y="188" width="440" height="594" rx="8"/>
  <text class="ink" x="962" y="226" font-size="22" font-weight="800">配置</text>
  <rect class="sub" x="962" y="250" width="376" height="244" rx="8"/>
  <text class="ink" x="986" y="286" font-size="19" font-weight="800">小白生成器</text>
  <text class="muted" x="986" y="314" font-size="14">填原 Emby 地址，自动生成反代后地址。</text>
  <text class="muted" x="986" y="350" font-size="13" font-weight="700">Emby 原地址</text>
  <rect x="986" y="360" width="328" height="38" rx="7" fill="#fff" fill-opacity=".76" stroke="#8ca0b8" stroke-opacity=".3"/>
  <text class="muted" x="1000" y="384" font-size="14">https://emby.example.com:443</text>
  <text class="muted" x="986" y="424" font-size="13" font-weight="700">入口路径</text>
  <rect x="986" y="434" width="150" height="38" rx="7" fill="#fff" fill-opacity=".76" stroke="#8ca0b8" stroke-opacity=".3"/>
  <text class="ink" x="1000" y="458" font-size="14">emby</text>
  <rect x="1152" y="434" width="162" height="38" rx="7" fill="#2563eb"/>
  <text fill="#fff" x="1190" y="458" font-size="14" font-weight="800">生成并填入</text>
  <rect x="986" y="510" width="328" height="92" rx="8" fill="#eff6ff" fill-opacity=".68" stroke="#2563eb" stroke-opacity=".35" stroke-dasharray="6 5"/>
  <text class="muted" x="1008" y="540" font-size="13">反代后地址</text>
  <text class="mono" x="1008" y="570" font-size="16">https://worker.example.com/emby</text>

  <text class="muted" x="962" y="640" font-size="13" font-weight="700">路径前缀</text>
  <rect x="962" y="650" width="174" height="38" rx="7" fill="#fff" fill-opacity=".76" stroke="#8ca0b8" stroke-opacity=".3"/>
  <text class="ink" x="976" y="674" font-size="14">emby</text>
  <text class="muted" x="1152" y="640" font-size="13" font-weight="700">反代模式</text>
  <rect x="1152" y="650" width="186" height="38" rx="7" fill="#fff" fill-opacity=".76" stroke="#8ca0b8" stroke-opacity=".3"/>
  <text class="ink" x="1166" y="674" font-size="14">clean</text>
  <text class="muted" x="962" y="718" font-size="13" font-weight="700">上游 Emby</text>
  <rect x="962" y="728" width="376" height="38" rx="7" fill="#fff" fill-opacity=".76" stroke="#8ca0b8" stroke-opacity=".3"/>
  <text class="muted" x="976" y="752" font-size="14">https://emby.example.com:443</text>
</svg>